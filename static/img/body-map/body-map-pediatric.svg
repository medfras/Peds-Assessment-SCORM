<svg id="body-map" viewBox="0 0 200 500" xmlns="http://www.w3.org/2000/svg">

  <!-- ═══════════════════════════════════════════
       VISUAL LAYER — pediatric proportions
       Larger head relative to body (~1:4 ratio),
       shorter torso, stubbier limbs.
       ═══════════════════════════════════════════ -->
  <g id="bm-visual" fill="#374151">

    <!-- Head (proportionally larger) -->
    <ellipse cx="100" cy="52" rx="32" ry="36"/>

    <!-- Neck (shorter) -->
    <rect x="91" y="88" width="18" height="14" rx="3"/>

    <!-- Chest -->
    <polygon points="60,102 140,102 134,190 66,190"/>

    <!-- Abdomen -->
    <polygon points="66,190 134,190 132,250 68,250"/>

    <!-- Pelvis -->
    <polygon points="68,250 132,250 128,288 72,288"/>

    <!-- Left upper arm -->
    <rect x="22" y="102" width="36" height="108" rx="8"/>

    <!-- Right upper arm -->
    <rect x="142" y="102" width="36" height="108" rx="8"/>

    <!-- Left forearm -->
    <rect x="16" y="208" width="30" height="100" rx="8"/>

    <!-- Right forearm -->
    <rect x="154" y="208" width="30" height="100" rx="8"/>

    <!-- Left hand -->
    <ellipse cx="32" cy="322" rx="14" ry="18"/>

    <!-- Right hand -->
    <ellipse cx="168" cy="322" rx="14" ry="18"/>

    <!-- Left upper leg -->
    <rect x="62" y="288" width="32" height="104" rx="6"/>

    <!-- Right upper leg -->
    <rect x="106" y="288" width="32" height="104" rx="6"/>

    <!-- Left lower leg -->
    <rect x="64" y="390" width="26" height="74" rx="5"/>

    <!-- Right lower leg -->
    <rect x="110" y="390" width="26" height="74" rx="5"/>

    <!-- Left foot -->
    <ellipse cx="70" cy="474" rx="18" ry="10"/>

    <!-- Right foot -->
    <ellipse cx="130" cy="474" rx="18" ry="10"/>

    <!-- Region dividers on torso -->
    <line x1="66" y1="190" x2="134" y2="190" stroke="#6b7280" stroke-width="1" fill="none"/>
    <line x1="68" y1="250" x2="132" y2="250" stroke="#6b7280" stroke-width="1" fill="none"/>

  </g>

  <!-- ═══════════════════════════════════════════
       HITBOX LAYER
       ═══════════════════════════════════════════ -->
  <g id="bm-hitboxes">

    <g data-region="head" class="bm-region">
      <ellipse cx="100" cy="52" rx="40" ry="46" fill="transparent" pointer-events="all"/>
    </g>

    <g data-region="neck" class="bm-region">
      <rect x="83" y="84" width="34" height="24" rx="3" fill="transparent" pointer-events="all"/>
    </g>

    <g data-region="chest" class="bm-region">
      <polygon points="56,100 144,100 136,191 64,191" fill="transparent" pointer-events="all"/>
    </g>

    <g data-region="abdomen" class="bm-region">
      <polygon points="64,191 136,191 134,252 66,252" fill="transparent" pointer-events="all"/>
    </g>

    <g data-region="pelvis" class="bm-region">
      <polygon points="66,252 134,252 130,290 70,290" fill="transparent" pointer-events="all"/>
    </g>

    <g data-region="arm-upper-right" class="bm-region">
      <rect x="12" y="100" width="52" height="114" rx="8" fill="transparent" pointer-events="all"/>
    </g>

    <g data-region="arm-upper-left" class="bm-region">
      <rect x="136" y="100" width="52" height="114" rx="8" fill="transparent" pointer-events="all"/>
    </g>

    <g data-region="arm-lower-right" class="bm-region">
      <rect x="8" y="206" width="46" height="108" rx="8" fill="transparent" pointer-events="all"/>
    </g>

    <g data-region="arm-lower-left" class="bm-region">
      <rect x="146" y="206" width="46" height="108" rx="8" fill="transparent" pointer-events="all"/>
    </g>

    <g data-region="hand-right" class="bm-region">
      <ellipse cx="32" cy="322" rx="24" ry="28" fill="transparent" pointer-events="all"/>
    </g>

    <g data-region="hand-left" class="bm-region">
      <ellipse cx="168" cy="322" rx="24" ry="28" fill="transparent" pointer-events="all"/>
    </g>

    <g data-region="leg-upper-right" class="bm-region">
      <rect x="56" y="286" width="44" height="110" rx="6" fill="transparent" pointer-events="all"/>
    </g>

    <g data-region="leg-upper-left" class="bm-region">
      <rect x="100" y="286" width="44" height="110" rx="6" fill="transparent" pointer-events="all"/>
    </g>

    <g data-region="leg-lower-right" class="bm-region">
      <rect x="58" y="388" width="38" height="82" rx="5" fill="transparent" pointer-events="all"/>
    </g>

    <g data-region="leg-lower-left" class="bm-region">
      <rect x="104" y="388" width="38" height="82" rx="5" fill="transparent" pointer-events="all"/>
    </g>

    <g data-region="foot-right" class="bm-region">
      <ellipse cx="70" cy="472" rx="26" ry="18" fill="transparent" pointer-events="all"/>
    </g>

    <g data-region="foot-left" class="bm-region">
      <ellipse cx="130" cy="472" rx="26" ry="18" fill="transparent" pointer-events="all"/>
    </g>

  </g>

</svg>
