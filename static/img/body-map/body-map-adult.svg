<svg id="body-map" viewBox="0 0 200 500" xmlns="http://www.w3.org/2000/svg">

  <!-- ═══════════════════════════════════════════
       VISUAL LAYER — adult proportions
       ═══════════════════════════════════════════ -->
  <g id="bm-visual" fill="#374151">

    <!-- Head -->
    <ellipse cx="100" cy="44" rx="26" ry="30"/>

    <!-- Neck -->
    <rect x="91" y="74" width="18" height="20" rx="3"/>

    <!-- Chest (wider at shoulders, tapers to waist) -->
    <polygon points="56,94 144,94 138,192 62,192"/>

    <!-- Abdomen -->
    <polygon points="62,192 138,192 140,266 60,266"/>

    <!-- Pelvis -->
    <polygon points="60,266 140,266 136,318 64,318"/>

    <!-- Left upper arm -->
    <rect x="20" y="94" width="36" height="118" rx="8"/>

    <!-- Right upper arm -->
    <rect x="144" y="94" width="36" height="118" rx="8"/>

    <!-- Left forearm -->
    <rect x="14" y="210" width="30" height="110" rx="8"/>

    <!-- Right forearm -->
    <rect x="156" y="210" width="30" height="110" rx="8"/>

    <!-- Left hand -->
    <ellipse cx="30" cy="338" rx="14" ry="20"/>

    <!-- Right hand -->
    <ellipse cx="170" cy="338" rx="14" ry="20"/>

    <!-- Left upper leg -->
    <rect x="60" y="318" width="34" height="96" rx="6"/>

    <!-- Right upper leg -->
    <rect x="106" y="318" width="34" height="96" rx="6"/>

    <!-- Left lower leg -->
    <rect x="62" y="412" width="28" height="66" rx="5"/>

    <!-- Right lower leg -->
    <rect x="110" y="412" width="28" height="66" rx="5"/>

    <!-- Left foot -->
    <ellipse cx="70" cy="488" rx="20" ry="10"/>

    <!-- Right foot -->
    <ellipse cx="130" cy="488" rx="20" ry="10"/>

    <!-- Region dividers on torso -->
    <line x1="62" y1="192" x2="138" y2="192" stroke="#6b7280" stroke-width="1" fill="none"/>
    <line x1="60" y1="266" x2="140" y2="266" stroke="#6b7280" stroke-width="1" fill="none"/>

  </g>

  <!-- ═══════════════════════════════════════════
       HITBOX LAYER — transparent interactive regions
       fill="transparent" + pointer-events="all" so
       CSS can set hover/flash color without JS.
       ═══════════════════════════════════════════ -->
  <g id="bm-hitboxes">

    <g data-region="head" class="bm-region">
      <ellipse cx="100" cy="44" rx="34" ry="40" fill="transparent" pointer-events="all"/>
    </g>

    <g data-region="neck" class="bm-region">
      <rect x="83" y="70" width="34" height="30" rx="3" fill="transparent" pointer-events="all"/>
    </g>

    <g data-region="chest" class="bm-region">
      <polygon points="52,93 148,93 140,193 60,193" fill="transparent" pointer-events="all"/>
    </g>

    <g data-region="abdomen" class="bm-region">
      <polygon points="60,193 140,193 142,267 58,267" fill="transparent" pointer-events="all"/>
    </g>

    <g data-region="pelvis" class="bm-region">
      <polygon points="58,267 142,267 138,320 62,320" fill="transparent" pointer-events="all"/>
    </g>

    <g data-region="arm-upper-right" class="bm-region">
      <rect x="10" y="92" width="52" height="124" rx="8" fill="transparent" pointer-events="all"/>
    </g>

    <g data-region="arm-upper-left" class="bm-region">
      <rect x="138" y="92" width="52" height="124" rx="8" fill="transparent" pointer-events="all"/>
    </g>

    <g data-region="arm-lower-right" class="bm-region">
      <rect x="6" y="208" width="46" height="118" rx="8" fill="transparent" pointer-events="all"/>
    </g>

    <g data-region="arm-lower-left" class="bm-region">
      <rect x="148" y="208" width="46" height="118" rx="8" fill="transparent" pointer-events="all"/>
    </g>

    <g data-region="hand-right" class="bm-region">
      <ellipse cx="30" cy="338" rx="24" ry="30" fill="transparent" pointer-events="all"/>
    </g>

    <g data-region="hand-left" class="bm-region">
      <ellipse cx="170" cy="338" rx="24" ry="30" fill="transparent" pointer-events="all"/>
    </g>

    <g data-region="leg-upper-right" class="bm-region">
      <rect x="54" y="316" width="46" height="102" rx="6" fill="transparent" pointer-events="all"/>
    </g>

    <g data-region="leg-upper-left" class="bm-region">
      <rect x="100" y="316" width="46" height="102" rx="6" fill="transparent" pointer-events="all"/>
    </g>

    <g data-region="leg-lower-right" class="bm-region">
      <rect x="56" y="410" width="40" height="74" rx="5" fill="transparent" pointer-events="all"/>
    </g>

    <g data-region="leg-lower-left" class="bm-region">
      <rect x="104" y="410" width="40" height="74" rx="5" fill="transparent" pointer-events="all"/>
    </g>

    <g data-region="foot-right" class="bm-region">
      <ellipse cx="70" cy="488" rx="28" ry="18" fill="transparent" pointer-events="all"/>
    </g>

    <g data-region="foot-left" class="bm-region">
      <ellipse cx="130" cy="488" rx="28" ry="18" fill="transparent" pointer-events="all"/>
    </g>

  </g>

</svg>
