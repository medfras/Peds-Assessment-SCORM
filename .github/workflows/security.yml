name: Security

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]
  schedule:
    - cron: "0 8 * * 1"  # weekly Monday 08:00 UTC

jobs:
  pip-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install pip-audit pip-tools
      # Audit the lockfile — exact pinned versions, not the loose bounds in requirements.txt
      - run: pip-audit -r requirements.lock
      # Also regenerate lockfile and fail if it drifts from what is committed
      - run: pip-compile requirements.txt --output-file requirements.lock.check --strip-extras --no-header --quiet
      - run: diff requirements.lock requirements.lock.check || (echo "requirements.lock is out of date — run pip-compile requirements.txt --output-file requirements.lock --strip-extras --no-header and commit the result" && exit 1)

  eslint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      # Errors (new unsafe innerHTML without escapeHTML) fail CI.
      # Warnings are pre-existing legacy patterns documented for Phase 4 remediation.
      - run: npx eslint static/js/app.js --max-warnings=200
