name: Tests

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  scoring-ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          pip install -r requirements.lock
          pip install pytest
      - name: Rubric smoke + Tier 2 coverage + scoring unit tests
        run: |
          pytest \
            tests/test_rubric_smoke.py \
            tests/test_tier2_matchers.py \
            tests/test_scoring_service.py \
            tests/test_rubric_loader.py \
            tests/test_debrief_renderer.py \
            tests/test_timeline_scoring_deference.py \
            -q --tb=short
