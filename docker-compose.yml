services:
  postgres:
    image: postgres:16
    container_name: ems_db
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ems_user -d ems_sim"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    container_name: ems_app
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - ./app:/app/app
      - ./static:/app/static
      - ${GCP_TTS_CREDENTIALS_HOST_PATH:-./.env.example}:/run/secrets/gcp-tts-key.json:ro
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
    driver: local
